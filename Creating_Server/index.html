<html>
    <head>
        <script>
            async function add(){
                const a= document.getElementById("first").value;
                const b= document.getElementById("second").value
                const res= await fetch(`http://localhost:3002/sum?a=${a}&b=${b}`);
                const json = await res.json()
                document.getElementById("response").innerHTML =json.ans;
            }
                </script>
    </head>
    <body>
        <input id="first" type="text" placeholder="firstNumber"/>
        <input id="second" type="text" placeholder="seecondNumber"/>
        <button onClick=add()>Add</button>
        <button>Sub</button>
        <button>Mul</button>
        <button>Div</button>
        <div id="response"></div>
    </body>
</html>
